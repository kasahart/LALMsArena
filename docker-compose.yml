x-healthcheck: &healthcheck
  test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 120s

x-env-base: &env-base
  PYTHONPATH: /workspace
  DEVICE: cpu
  HF_HOME: /root/.cache/huggingface
  HF_HUB_CACHE: /root/.cache/huggingface/hub
  TRANSFORMERS_CACHE: /root/.cache/huggingface/transformers

services:
  qwen2-audio:
    build:
      context: .
      dockerfile: containers/qwen2_audio/Dockerfile
    container_name: arena-qwen2-audio
    restart: "no"
    volumes:
      - .:/workspace
      - /mnt/kioxia_g2/model_cache/huggingface:/root/.cache/huggingface
    environment:
      <<: *env-base
      MODEL_NAME: "Qwen2-Audio"
    ports: ["8600:8000"]
    healthcheck: *healthcheck

  audio-flamingo:
    build:
      context: .
      dockerfile: containers/audio_flamingo/Dockerfile
    container_name: arena-audio-flamingo
    restart: "no"
    volumes:
      - .:/workspace
      - /mnt/kioxia_g2/model_cache/huggingface:/root/.cache/huggingface
    environment:
      <<: *env-base
      MODEL_NAME: "Audio Flamingo Next"
    ports: ["8601:8000"]
    healthcheck: *healthcheck

  audio-flamingo-captioner:
    build:
      context: .
      dockerfile: containers/audio_flamingo/Dockerfile
    container_name: arena-audio-flamingo-captioner
    restart: "no"
    volumes:
      - .:/workspace
      - /mnt/kioxia_g2/model_cache/huggingface:/root/.cache/huggingface
    environment:
      <<: *env-base
      MODEL_NAME: "Audio Flamingo Next Captioner"
    ports: ["8607:8000"]
    healthcheck: *healthcheck

  audio-flamingo-think:
    build:
      context: .
      dockerfile: containers/audio_flamingo/Dockerfile
    container_name: arena-audio-flamingo-think
    restart: "no"
    volumes:
      - .:/workspace
      - /mnt/kioxia_g2/model_cache/huggingface:/root/.cache/huggingface
    environment:
      <<: *env-base
      MODEL_NAME: "Audio Flamingo Next Think"
    ports: ["8608:8000"]
    healthcheck: *healthcheck

  gemma4-e4b:
    build:
      context: .
      dockerfile: containers/gemma4_e4b/Dockerfile
    container_name: arena-gemma4-e4b
    restart: "no"
    volumes:
      - .:/workspace
      - /mnt/kioxia_g2/model_cache/huggingface:/root/.cache/huggingface
    environment:
      <<: *env-base
      MODEL_NAME: "Gemma-4-E4B"
    ports: ["8602:8000"]
    healthcheck: *healthcheck

  moss-4b:
    build:
      context: .
      dockerfile: containers/moss_audio/Dockerfile
    container_name: arena-moss-4b
    restart: "no"
    volumes:
      - .:/workspace
      - /mnt/kioxia_g2/model_cache/huggingface:/root/.cache/huggingface
    environment:
      <<: *env-base
      MODEL_NAME: "MOSS-Audio-4B"
    ports: ["8603:8000"]
    healthcheck: *healthcheck

  moss-8b:
    build:
      context: .
      dockerfile: containers/moss_audio/Dockerfile
    container_name: arena-moss-8b
    restart: "no"
    volumes:
      - .:/workspace
      - /mnt/kioxia_g2/model_cache/huggingface:/root/.cache/huggingface
    environment:
      <<: *env-base
      MODEL_NAME: "MOSS-Audio-8B"
    ports: ["8604:8000"]
    healthcheck: *healthcheck

  moss-8b-thinking:
    build:
      context: .
      dockerfile: containers/moss_audio/Dockerfile
    container_name: arena-moss-8b-thinking
    restart: "no"
    volumes:
      - .:/workspace
      - /mnt/kioxia_g2/model_cache/huggingface:/root/.cache/huggingface
    environment:
      <<: *env-base
      MODEL_NAME: "MOSS-Audio-8B-Thinking"
    ports: ["8606:8000"]
    healthcheck: *healthcheck

  step-audio-vllm:
    image: stepfun2025/vllm:step-audio-2-v20250909
    container_name: arena-step-audio-vllm
    restart: "no"
    volumes:
      - /mnt/kioxia_g2/model_cache/huggingface:/root/.cache/huggingface
    environment:
      HF_HOME: /root/.cache/huggingface
      HF_HUB_CACHE: /root/.cache/huggingface/hub
    command: >
      python3 -m vllm.entrypoints.openai.api_server
      --model stepfun-ai/Step-Audio-R1.1
      --port 9999
      --host 0.0.0.0
      --trust-remote-code
      --max-model-len 4096
      --tensor-parallel-size 1
      --gpu-memory-utilization 0.90

  step-audio-r1:
    build:
      context: .
      dockerfile: containers/step_audio_r1/Dockerfile
    container_name: arena-step-audio-r1
    restart: "no"
    volumes:
      - .:/workspace
      - /mnt/kioxia_g2/model_cache/huggingface:/root/.cache/huggingface
    environment:
      PYTHONPATH: /workspace
      DEVICE: cpu
      MODEL_NAME: "Step-Audio-R1.1"
      STEP_AUDIO_VLLM_URL: "http://step-audio-vllm:9999"
      HF_HOME: /root/.cache/huggingface
      HF_HUB_CACHE: /root/.cache/huggingface/hub
    ports: ["8609:8000"]
    depends_on:
      - step-audio-vllm
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 720s

  qwen3-omni:
    build:
      context: .
      dockerfile: containers/qwen3_omni/Dockerfile
    container_name: arena-qwen3-omni
    restart: "no"
    volumes:
      - .:/workspace
      - /mnt/kioxia_g2/model_cache/huggingface:/root/.cache/huggingface
    environment:
      <<: *env-base
      MODEL_NAME: "Qwen3-Omni"
    ports: ["8610:8000"]
    healthcheck:
      <<: *healthcheck
      start_period: 300s

  qwen3-omni-thinking:
    build:
      context: .
      dockerfile: containers/qwen3_omni/Dockerfile
    container_name: arena-qwen3-omni-thinking
    restart: "no"
    volumes:
      - .:/workspace
      - /mnt/kioxia_g2/model_cache/huggingface:/root/.cache/huggingface
    environment:
      <<: *env-base
      MODEL_NAME: "Qwen3-Omni-Thinking"
    ports: ["8612:8000"]
    healthcheck:
      <<: *healthcheck
      start_period: 300s

  qwen3-omni-captioner:
    build:
      context: .
      dockerfile: containers/qwen3_omni/Dockerfile
    container_name: arena-qwen3-omni-captioner
    restart: "no"
    volumes:
      - .:/workspace
      - /mnt/kioxia_g2/model_cache/huggingface:/root/.cache/huggingface
    environment:
      <<: *env-base
      MODEL_NAME: "Qwen3-Omni-Captioner"
    ports: ["8611:8000"]
    healthcheck:
      <<: *healthcheck
      start_period: 300s

  nemotron-vllm:
    build:
      context: .
      dockerfile: containers/nemotron_vllm/Dockerfile
    container_name: arena-nemotron-vllm
    restart: "no"
    volumes:
      - /mnt/kioxia_g2/model_cache/huggingface:/root/.cache/huggingface
    environment:
      HF_HOME: /root/.cache/huggingface
      HF_HUB_CACHE: /root/.cache/huggingface/hub
    entrypoint: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
    command:
      - --model
      - nvidia/Nemotron-3-Nano-Omni-30B-A3B-Reasoning-BF16
      - --port
      - "9999"
      - --host
      - "0.0.0.0"
      - --trust-remote-code
      - --max-model-len
      - "16384"
      - --tensor-parallel-size
      - "1"
      - --gpu-memory-utilization
      - "0.90"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9999/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  nemotron-omni-reasoning:
    build:
      context: .
      dockerfile: containers/nemotron_omni/Dockerfile
    container_name: arena-nemotron-omni-reasoning
    restart: "no"
    volumes:
      - .:/workspace
      - /mnt/kioxia_g2/model_cache/huggingface:/root/.cache/huggingface
    environment:
      PYTHONPATH: /workspace
      DEVICE: cpu
      MODEL_NAME: "Nemotron-Nano-Omni-Reasoning"
      NEMOTRON_VLLM_URL: "http://nemotron-vllm:9999"
      HF_HOME: /root/.cache/huggingface
      HF_HUB_CACHE: /root/.cache/huggingface/hub
    ports: ["8615:8000"]
    depends_on:
      nemotron-vllm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 720s

  mimo-audio:
    build:
      context: .
      dockerfile: containers/mimo_audio/Dockerfile
    container_name: arena-mimo-audio
    restart: "no"
    volumes:
      - .:/workspace
      - /mnt/kioxia_g2/model_cache/huggingface:/root/.cache/huggingface
    environment:
      <<: *env-base
      MODEL_NAME: "MiMo-Audio-7B"
    ports: ["8613:8000"]
    healthcheck: *healthcheck

  mimo-audio-thinking:
    build:
      context: .
      dockerfile: containers/mimo_audio/Dockerfile
    container_name: arena-mimo-audio-thinking
    restart: "no"
    volumes:
      - .:/workspace
      - /mnt/kioxia_g2/model_cache/huggingface:/root/.cache/huggingface
    environment:
      <<: *env-base
      MODEL_NAME: "MiMo-Audio-7B-Thinking"
    ports: ["8614:8000"]
    healthcheck: *healthcheck

  salmonn-13b:
    build:
      context: .
      dockerfile: containers/salmonn_13b/Dockerfile
    profiles: [salmonn]
    container_name: arena-salmonn-13b
    restart: "no"
    volumes:
      - .:/workspace
      - /mnt/kioxia_g2/model_cache/huggingface:/root/.cache/huggingface
    environment:
      <<: *env-base
      MODEL_NAME: "SALMONN-13B"
      SALMONN_BEATS_PATH: "${SALMONN_BEATS_PATH}"
    ports: ["8605:8000"]
    healthcheck:
      <<: *healthcheck
      start_period: 180s
